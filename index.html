<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login IMS</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;}
.content{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;width:90%;max-width:400px;}
input,button{padding:10px;margin:5px;width:100%;border-radius:5px;}
input{background:rgba(0,0,0,0.3);color:white;border:1px solid #00ff00;}
button{background:#00ff00;border:none;color:black;cursor:pointer;}
button:hover{background:#00cc00;}
</style>
</head>
<body style="background:black;">

<div class="content">
  <h1>INTEGRATED MONITORING SYSTEM</h1>
  <form onsubmit="login(event)">
    <input type="text" name="username" placeholder="Username" required autocomplete="off">
    <input type="password" name="password" placeholder="Password" required autocomplete="off">
    <button type="submit">Login</button>
  </form>
</div>

<script>
// Hash SHA-256
async function hashPassword(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Login function
async function login(event){
  event.preventDefault();
  const user = event.target.username.value.trim();
  const pass = event.target.password.value.trim();
  const hashedPass = await hashPassword(pass);

  try{
    const res = await fetch("https://raw.githubusercontent.com/BT5Python/IMS_Login/main/users.json");
    const users = await res.json();
    const match = users.find(u=>u.username===user && u.passwordHash===hashedPass);
    if(match){
      window.location.href="https://github.com/BT5Python/dasboard_IMS";
    }else{
      alert("Username atau Password salah!");
    }
  }catch(e){
    alert("Gagal ambil data user!");
  }
}
</script>
</body>
</html>
